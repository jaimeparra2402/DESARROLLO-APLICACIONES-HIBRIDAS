<ion-header>
  <ion-toolbar>
    <ion-title class="ion-text-center">MyCine</ion-title>

    <ion-buttons slot="end">
      <div class="badge-container">
        <ion-button routerLink="/favorites">
          <ion-icon slot="icon-only" name="heart" color="danger"></ion-icon>
        </ion-button>
        
        @if (movieService.favoritesCount() >= 0) {
          <ion-badge color="dark">
            {{ movieService.favoritesCount() }}
          </ion-badge>
        }
      </div>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-searchbar (ionInput)="onSearch($event)" debounce="500"></ion-searchbar>

  <ion-list>
    @for (movie of movieService.movies(); track movie.imdbID) {
      <ion-item [routerLink]="['/details', movie.imdbID]">
        <ion-label>
          <h2>{{ movie.Title }}</h2>
          <p>{{ movie.Year }}</p>
        </ion-label>
      </ion-item>
    } @empty {
      <ion-item>
        Introduzca un término de búsqueda para comenzar.
      </ion-item>
    }
  </ion-list>
</ion-content>

<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start"> <ion-back-button defaultHref="/tabs/products"></ion-back-button> </ion-buttons>
    <ion-title>Catálogo de Productos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item>
      <ion-thumbnail slot="start">
        <img src="https://ionicframework.com/docs/img/demos/thumbnail.svg" />
      </ion-thumbnail>
      <ion-label>
        <h2>Producto A</h2>
        <p>Precio: 25.00€</p>
      </ion-label>
      <ion-note slot="end">Stock: 10</ion-note>
    </ion-item>

    <ion-item>
      <ion-thumbnail slot="start">
        <img src="https://ionicframework.com/docs/img/demos/thumbnail.svg" />
      </ion-thumbnail>
      <ion-label>
        <h2>Producto B</h2>
        <p>Precio: 12.50€</p>
      </ion-label>
      <ion-note slot="end">Stock: 5</ion-note>
    </ion-item>
  </ion-list>

  <ion-button expand="block" color="danger" (click)="logout()">
      Cerrar sesión
  </ion-button>
</ion-content>

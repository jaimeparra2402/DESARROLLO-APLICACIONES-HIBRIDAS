<ion-header>
  <ion-toolbar>
    <ion-title>Reservas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list >
    <ion-item *ngFor="let res of reservations" button>
      <ion-icon name="calendar-outline" slot="start"></ion-icon>
      <ion-label>
        <h2>{{ res.title }}</h2>
        <p>Fecha: {{ res.date }} - {{ res.time }}h</p>
      </ion-label>
    </ion-item>
  </ion-list>


  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="nuevaReserva()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>

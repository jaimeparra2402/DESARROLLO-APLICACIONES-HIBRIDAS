<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start"> <ion-back-button defaultHref="/tabs/reservations"></ion-back-button> </ion-buttons>
    <ion-title>Reservas Activas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngFor="let res of reservations" (click)="nuevaReserva()" button>
      <ion-icon name="calendar-outline" slot="start"></ion-icon>
      <ion-label>
        <h2>{{ res.title }}</h2>
        <p>Fecha: {{ res.date }} - {{ res.time }}h</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>

<ion-header>
  <ion-toolbar>
    <ion-title>Clientes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item
      *ngFor="let client of clients"
      [routerLink]="['/tabs/clients', client.id]"
      button
    >
      <ion-avatar slot="start">
        <img [src]="client.avatar" />
      </ion-avatar>
      <ion-label>
        <h2>{{ client.name }}</h2>
        <p>{{ client.description }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>

<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start"> <ion-back-button defaultHref="/tabs/clients"></ion-back-button> </ion-buttons>
    <ion-title>Listado de Clientes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngFor="let client of clients" [routerLink]="['/client', client.id]" button>
      <ion-avatar slot="start">
        <img [src]="client.avatar" />
      </ion-avatar>
      <ion-label>
        <h2>{{ client.name }}</h2>
        <p>{{ client.description }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>

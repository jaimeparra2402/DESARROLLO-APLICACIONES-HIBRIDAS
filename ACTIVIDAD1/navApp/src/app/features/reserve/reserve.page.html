<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/reservations"></ion-back-button>
    </ion-buttons>
    <ion-title>Reservar</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card>
    <ion-card-header>
      <ion-card-title>Nueva Reserva</ion-card-title>
      <ion-card-subtitle>Completa la información</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      
      <ion-item>
        <ion-label position="stacked">Nombre del cliente</ion-label>
        <ion-input placeholder="Introduce el nombre"></ion-input>
      </ion-item>

      <ion-button expand="block" color="success" class="ion-margin-top">
        Confirmar Reserva
      </ion-button>

    </ion-card-content>
  </ion-card>

</ion-content>

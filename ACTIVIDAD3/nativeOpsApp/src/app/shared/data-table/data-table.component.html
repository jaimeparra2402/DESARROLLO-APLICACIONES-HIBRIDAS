<div *ngIf="data && data.length > 0">
  <ion-card
    *ngFor="let item of data"
    (click)="onItemClick()"
    class="incidencia-card"
  >
    <div class="card-content-wrapper">
      <div class="image-container">
        <img *ngIf="item.photo" [src]="item.photo" alt="Incidencia" />
        <div *ngIf="!item.photo" class="no-photo">
          <ion-icon name="image-outline"></ion-icon>
        </div>
      </div>

      <ion-card-header>
        <ion-card-title>{{ item.title }}</ion-card-title>
        <ion-note color="medium" class="location-text">
          <ion-icon name="location-sharp"></ion-icon>
          {{ item.lat | number: "1.4-4" }}, {{ item.lng | number: "1.4-4" }}
        </ion-note>
      </ion-card-header>

      <div class="action-icon">
        <ion-icon name="chevron-forward-outline"></ion-icon>
      </div>
    </div>
  </ion-card>
</div>

<div *ngIf="!data || data.length === 0" class="empty-state">
  <ion-icon name="clipboard-outline"></ion-icon>
  <h3>Sin incidencias</h3>
  <p>No hay reportes registrados todavía.</p>
</div>

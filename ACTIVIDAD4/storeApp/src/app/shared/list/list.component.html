<ion-list>
  @for (product of products; track product.id) {
    <ion-item-sliding #slidingItem [disabled]="!canDelete">
      <ion-item lines="none">
        <ion-thumbnail slot="start">
          <img [src]="product.imageUrl" [alt]="product.name" />
        </ion-thumbnail>

        <ion-label>
          <h2>{{ product.name }}</h2>
          <p>{{ product.description }}</p>
        </ion-label>

        @if (showAction) {
          <ion-button
            slot="end"
            fill="clear"
            (click)="viewDetails.emit(product)"
          >
            <ion-icon
              name="information-circle-outline"
              slot="icon-only"
            ></ion-icon>
          </ion-button>
        }
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option
          color="secondary"
          (click)="onDeleteProduct(product, slidingItem)"
        >
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  }
</ion-list>

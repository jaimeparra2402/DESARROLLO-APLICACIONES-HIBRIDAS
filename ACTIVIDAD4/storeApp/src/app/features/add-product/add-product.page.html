<app-header
  title="Nuevo producto"
  [backButton]="true"
  defaultHref="/products"
  [noBorder]="true"
></app-header>

<ion-content class="ion-padding">
  <form [formGroup]="productForm" (ngSubmit)="addProduct()">
    <ion-item>
      <ion-label position="floating">Nombre del Producto</ion-label>
      <ion-input formControlName="name"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Descripción</ion-label>
      <ion-textarea formControlName="description"></ion-textarea>
    </ion-item>

    <ion-item>
      <ion-label position="floating">URL de la imagen</ion-label>
      <ion-input type="url" formControlName="imageUrl"> </ion-input>
    </ion-item>

    @if (productForm.get('imageUrl')?.valid) {
    <div class="ion-text-center ion-padding">
      <p><small>Previsualización :</small></p>
      <img
        [src]="productForm.value.imageUrl"
        style="width: 150px; border-radius: 8px; border: 1px solid #ddd"
      />
    </div>
    }

    <ion-button
      expand="full"
      type="submit"
      [disabled]="productForm.invalid"
      class="ion-margin-top"
    >
      Guardar Producto
    </ion-button>
  </form>
</ion-content>

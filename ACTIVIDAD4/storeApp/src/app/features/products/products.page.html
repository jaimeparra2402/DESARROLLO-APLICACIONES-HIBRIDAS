<app-header
  title="Mis Productos"
  [showAdd]="true"
  [showLogout]="true"
  (onAdd)="goToAddProduct()"
  (onLogout)="logout()"
>
</app-header>

<ion-content>
  <app-list
    [products]="productService.products()"
    [showAction]="true"
    (viewDetails)="showDetails($event)"
    (deleteProduct)="confirmDelete($event)"
    [canDelete]="true"
  >
  </app-list>
</ion-content>
